# Default configuration for YouTube Ranger
# Created: 2025-08-03

ui:
  colorscheme: default
  show_hidden: false # Show private playlists
  preview_lines: 10
  column_ratios: [0.3, 0.4, 0.3]
  show_icons: true
  confirm_delete: true
  auto_refresh: false
  refresh_interval: 300 # seconds

keybindings:
  # General
  quit: ["q", "Q"]
  help: ["?"]
  command: [":"]
  search: ["/"]

  # Navigation
  up: ["k", "up"]
  down: ["j", "down"]
  left: ["h", "left"]
  right: ["l", "right"]
  top: ["g", "g"]
  bottom: ["G"]

  # Selection
  mark: [" "] # space
  visual: ["v"]
  unselect_all: ["u", "v"]
  invert_selection: ["V"]

  # Operations
  copy: ["y", "y"]
  cut: ["d", "d"]
  paste: ["p", "p"]
  delete: ["d", "D"]
  rename: ["c", "w"]

  # Playlist operations
  new_playlist: ["g", "n"]
  delete_playlist: ["g", "d"]
  refresh: ["g", "r"]
  refresh_all: ["g", "R"]

cache:
  enabled: true
  directory: ".yanger_cache"
  ttl: 3600 # 1 hour
  max_size_mb: 100
  load_on_startup: false # Set to true to load playlists automatically

transcripts:
  enabled: true
  auto_fetch: false # Automatically fetch transcripts on hover (vs manual with 'gt')
  store_in_db: true # Store transcripts in SQLite database
  store_compressed: true # Compress transcripts with gzip to save space
  export_directory: "~/.cache/yanger/transcripts" # External folder for transcript files (null = disabled, or path like ~/.cache/yanger/transcripts)
  export_txt: true # Export plain text transcript files
  export_json: true # Export JSON files with timestamps and metadata
  languages: ["en"] # Preferred transcript languages (in priority order)
  # External shell command run by `:transcript` on the current video. Supports
  # {url} and {id} placeholders (if neither is present the video URL is appended).
  # Empty = unset. Can also be set via the YANGER_TRANSCRIPT_COMMAND env var or
  # at runtime with `:set transcript_command "..."`. Examples:
  #   transcript_command: "summarize {url}"
  #   transcript_command: "yeet {url} | fabric -sp summarize"
  transcript_command: ""

youtube:
  # Leave empty to auto-resolve to ~/.config/yanger/{client_secret,token}.json
  # (with legacy ./config fallbacks). Set an absolute path to override.
  client_secrets_file: ""
  token_file: ""
  max_results_per_page: 50
  quota_warning_threshold: 7500 # 75%
  quota_critical_threshold: 9000 # 90%


# User-defined custom commands, run with `:run <name>` on the current or marked videos.
# Placeholders are shell-quoted before injection: {url} / {id} (per-video), {urls} / {ids}
# (batch, one invocation over the whole selection). Also settable via YANGER_CMD_<NAME> env.
# commands:
#   dl:  "yt-dlp {url}"                       # bare string => per-video
#   sum: "yeet {url} | fabric -sp summarize"  # pipes work (shell=True; your own config)
#   dlall: { run: "yt-dlp {urls}", mode: batch }   # one yt-dlp for the whole selection
#   wipe:  { run: "trash {url}", confirm: true }    # always prompt before running
